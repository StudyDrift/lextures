# Run tests, lint, and builds for the Go API, browser clients, and related checks on pull requests targeting main.
# Does not run on direct pushes to main (see deploy-demo.yml for that path).

name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-go:
    name: Server (Go)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/studydrift_test
      RUN_MIGRATIONS: "true"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: studydrift_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d studydrift_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache-dependency-path: server/go.sum

      - name: go mod download
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # v1.x binaries were built with Go < 1.25 and cannot load configs for go 1.25 modules.
          version: v2.11.4
          working-directory: server
          args: --timeout=4m

      # Omit packages with no *_test.go files: Go 1.25 + -coverprofile can fail those with
      # "go: no such tool covdata" (golang/go#75031).
      - name: go test (internal packages; Postgres-backed integration tests)
        run: |
          FORMAT='{{if .TestGoFiles}}{{.ImportPath}}{{"\n"}}{{end}}'
          pkgs=$(go list -f "$FORMAT" ./internal/...)
          go test $pkgs -count=1 -timeout=5m -coverprofile=coverage.out -covermode=atomic

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      # Aggregate coverage of all ./internal/... is low while most packages lack tests. The true
      # total is ~11–12% but `go tool cover -func` prints one decimal, so values like 10.9% can
      # appear; use a 10.5% floor to avoid flaky CI while still catching large drops.
      - name: Cover total (>= 10.5% internal aggregate; raise as more packages are tested)
        run: |
          go tool cover -func=coverage.out | tail -1
          t=$(go tool cover -func=coverage.out | tail -1 | awk '{ gsub(/%/,"",$NF); print $NF }')
          echo "total statement coverage (internal): ${t}%"
          awk -v t="$t" 'BEGIN{ exit (t+0 < 10.5) ? 1 : 0 }' /dev/null || (echo "coverage of ./internal/... must be >= 10.5%" && exit 1)

      - name: go build
        run: go build -o /dev/null ./cmd/server

  client-cli:
    name: Client (CLI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: clients/cli/go.sum

      - name: go mod download
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # v1.x binaries were built with Go < 1.25 and cannot load configs for go 1.25 modules.
          version: v2.11.4
          working-directory: clients/cli
          args: --timeout=4m

      - name: go test
        run: go test ./... -count=1 -timeout=5m

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: go build
        run: go build -o /dev/null main.go

  clients:
    name: Client (${{ matrix.client }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client: [web]
    defaults:
      run:
        working-directory: clients/${{ matrix.client }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/${{ matrix.client }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high or critical)
        run: npm audit --audit-level=high

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e-build:
    name: E2E build (API + web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache-dependency-path: server/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - name: Build API server binary
        working-directory: server
        run: |
          mkdir -p "${{ github.workspace }}/.cache/e2e"
          go build -trimpath -ldflags="-s -w" -o "${{ github.workspace }}/.cache/e2e/server" ./cmd/server

      - name: Install and build web client
        working-directory: clients/web
        env:
          VITE_API_URL: http://localhost:8080
        run: |
          npm ci
          npm run build

      - name: Upload e2e build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-build
          path: |
            .cache/e2e/server
            clients/web/dist
          retention-days: 1

  e2e:
    name: E2E shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    needs: e2e-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    env:
      E2E_USE_DOCKER: "0"
      E2E_DATABASE_URL: postgres://e2e:e2e@localhost:5432/e2e?sslmode=disable
      E2E_API_PORT: "8080"
      E2E_SERVER_BIN: ${{ github.workspace }}/.cache/e2e/server
      E2E_WEB_MODE: preview
      E2E_SKIP_DEPS: "1"
      E2E_HEALTH_POLL_SECS: "1"
      E2E_HEALTH_MAX_ATTEMPTS: "45"
      E2E_ADMIN_EMAIL: admin@e2e.test
      CI: "true"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e -d e2e"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Download e2e build artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-build

      # upload-artifact does not preserve the executable bit on the API binary.
      - name: Restore server binary permissions
        run: chmod +x "${{ github.workspace }}/.cache/e2e/server"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            clients/web/package-lock.json
            e2e/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install web client (preview runtime)
        working-directory: clients/web
        run: npm ci --prefer-offline --quiet

      - name: Install e2e dependencies and Playwright browser
        working-directory: e2e
        run: |
          npm ci --prefer-offline --quiet
          npx playwright install --with-deps chromium

      - name: Run e2e shard (local stack)
        run: bash e2e/scripts/e2e-local.sh --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: e2e/blob-report
          retention-days: 1

  e2e-report:
    name: E2E report (merge shards)
    needs: [e2e]
    if: ${{ !cancelled() && always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci --prefer-offline --quiet

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: e2e/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge Playwright reports
        working-directory: e2e
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
