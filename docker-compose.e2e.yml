# Ephemeral stack for e2e testing — NO named volumes so all data is discarded on `docker compose down -v`.
#
# Usage (from repo root):
#   docker compose -f docker-compose.e2e.yml up -d --build --wait
#   <run Playwright tests>
#   docker compose -f docker-compose.e2e.yml down -v
#
# Note: SQLite is not used here because the migration files rely on PostgreSQL-specific
# syntax (UUID generation, JSONB, advisory locks, etc.) and cannot run on SQLite without
# a full rewrite.  Using an ephemeral Postgres container achieves the same goal: all data
# is destroyed when `docker compose down -v` is called.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      POSTGRES_DB: e2e
    # Intentionally no named volume — data lives only in the anonymous volume for this run.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e -d e2e"]
      interval: 3s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav:1.4
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: e2e
      RABBITMQ_DEFAULT_PASS: e2e
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: lextures-e2e-server:latest
    environment:
      DATABASE_URL: postgres://e2e:e2e@postgres:5432/e2e?sslmode=disable
      JWT_SECRET: e2e-test-secret-do-not-use-outside-tests
      BOOTSTRAP_ADMIN_EMAIL: admin@e2e.test
      RUN_MIGRATIONS: "true"
      COURSE_FILES_ROOT: /var/course-files
      PORT: "8080"
      CLAMAV_ADDR: ${CLAMAV_ADDR:-clamav:3310}
      EMAIL_NOTIFICATIONS_ENABLED: ${EMAIL_NOTIFICATIONS_ENABLED:-false}
      COPPA_WORKFLOW_ENABLED: "true"
      ISO_ISMS_ENABLED: "true"
      BACKUP_MODULE_ENABLED: "true"
      RTL_ENABLED: "true"
      FERPA_WORKFLOW_ENABLED: "true"
      CCPA_MODULE_ENABLED: "true"
      STATE_PRIVACY_ENABLED: "true"
      GDPR_MODULE_ENABLED: "true"
      AV_SCANNING_ENABLED: "true"
      CLAMAV_STUB: "true"
      STORAGE_QUOTAS_ENABLED: "true"
      FEATURE_ENGAGEMENT_TRACKING: "true"
      FF_BROADCASTS: "true"
      FF_PLAGIARISM_CHECKS: "true"
      ORIGINALITY_DETECTION_ENABLED: "true"
      ORIGINALITY_STUB_EXTERNAL: "true"
      RABBITMQ_URL: amqp://e2e:e2e@rabbitmq:5672/
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # Server image installs curl (not wget); wget would keep the container unhealthy and break `compose up --wait`.
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health -o /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Dedicated low-limit instance for the rate-limiting e2e spec (plan 17.6). Kept
  # separate from `server` so the strict per-IP auth cap does not throttle the
  # rest of the suite, which all shares one client IP. Reuses the server image
  # and the shared Redis so limits are enforced exactly as in production.
  server-ratelimit:
    image: lextures-e2e-server:latest
    environment:
      DATABASE_URL: postgres://e2e:e2e@postgres:5432/e2e?sslmode=disable
      JWT_SECRET: e2e-test-secret-do-not-use-outside-tests
      RUN_MIGRATIONS: "false"
      COURSE_FILES_ROOT: /var/course-files
      PORT: "8080"
      CLAMAV_STUB: "true"
      REDIS_URL: redis://redis:6379
      RATE_LIMITING_ENABLED: "true"
      RATE_LIMIT_AUTH_PER_MIN: "5"
      RATE_LIMIT_AUTH_PER_HOUR: "100"
      RATE_LIMIT_GLOBAL_PER_MIN: "100000"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health -o /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ./clients/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:80/ -o /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
