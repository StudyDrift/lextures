<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Lextures</title>
    <script>
      // GitHub Pages SPA fallback: rewrite /docs/... and /blog/... to /?/... so index.html loads.
      // https://github.com/rafgraph/spa-github-pages
      ;(function (l) {
        var pathSegmentsToKeep = 0
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        )
      })(window.location)
    </script>
  </head>
  <body></body>
</html>
