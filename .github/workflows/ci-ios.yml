# Lint, build, and test the iOS app on PRs that touch clients/ios/.
name: CI — iOS

on:
  pull_request:
    branches:
      - main
    paths:
      - 'clients/ios/**'

concurrency:
  group: ci-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    name: iOS
    runs-on: macos-15
    defaults:
      run:
        working-directory: clients/ios
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

      - name: Accessibility artifacts
        run: ../../scripts/check-mobile-a11y.sh

      - name: I18n artifacts
        run: ../../scripts/check-mobile-i18n.sh

      - name: Build (simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Lextures.xcodeproj \
            -scheme Lextures \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      # Pick an available iPhone simulator (macOS/Xcode images vary; iPhone 16 may be absent).
      - name: Select iOS Simulator
        id: sim
        run: |
          set -euo pipefail
          for sim in "iPhone 16" "iPhone 17" "iPhone 17 Pro" "iPhone 15"; do
            if xcrun simctl list devices available 2>/dev/null | grep -qF "    $sim ("; then
              echo "name=$sim" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No iOS Simulator found. Available devices:"
          xcrun simctl list devices available || true
          exit 1

      - name: Boot iOS Simulator
        run: |
          set -euo pipefail
          name="${{ steps.sim.outputs.name }}"
          udid="$(xcrun simctl list devices available | grep -F "    $name (" | head -1 | sed -E 's/.*\(([0-9A-F-]+)\).*/\1/')"
          echo "Booting $name ($udid)"
          xcrun simctl boot "$udid" 2>/dev/null || true
          xcrun simctl bootstatus "$udid" -b

      # Unit tests for accessibility helpers and future coverage.
      - name: Test
        run: |
          set -o pipefail
          log=/tmp/xcodebuild-test.log
          echo "Running unit tests on: ${{ steps.sim.outputs.name }}"
          xcodebuild test \
            -project Lextures.xcodeproj \
            -scheme Lextures \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -skip-testing:LexturesTests/EvaluationLogicTests \
            -skip-testing:LexturesTests/PlannerModelsTests/testCollectEvaluationTodos \
            2>&1 | tee "$log" | xcpretty
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "--- xcodebuild test failed; surfacing failing cases ---"
            grep -E 'Test Case .* failed|TEST FAILED|Executed .* failures|error: ' "$log" | tail -40 || true
            grep -E 'Test Case .* failed' "$log" | tail -10 | while read -r line; do
              echo "::error::$line"
            done || true
            exit "$code"
          fi

      - name: Test (evaluation)
        run: |
          set -o pipefail
          log=/tmp/xcodebuild-eval-test.log
          xcodebuild test \
            -project Lextures.xcodeproj \
            -scheme Lextures \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:LexturesTests/EvaluationLogicTests \
            -only-testing:LexturesTests/PlannerModelsTests/testCollectEvaluationTodos \
            2>&1 | tee "$log"
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "--- evaluation tests failed ---"
            grep -E 'Test Case .* failed|TEST FAILED|error: |XCTAssert' "$log" | tail -40 || true
            grep -E 'Test Case .* failed' "$log" | while read -r line; do
              echo "::error::$line"
            done || true
            exit "$code"
          fi
