# Minimal stack for a single droplet: Postgres and API are co-located (no external DB).
# nginx publishes 80 (HTTP) and 443 (HTTPS for Cloudflare Full); API and DB stay on the Docker network.
#   Put LEXTURES_SERVER_IMAGE and LEXTURES_WEB_IMAGE in .env (CI does this) or export them before `up`.
#   docker compose -f docker-compose.deploy.yml --env-file .env up -d
#   VITE_API_URL should match the public origin (e.g. https://demo.lextures.com behind Cloudflare).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: studydrift
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: studydrift
    volumes:
      # Host path is created by demo cloud-init on the attached DO block volume (/mnt/lextures-db).
      - /mnt/lextures-db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studydrift -d studydrift"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-studydrift}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-studydrift}
    healthcheck:
      # ping alone can pass before the AMQP listener on 5672 accepts connections.
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_connectivity",
        ]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # noeviction keeps the JWT blocklist / rate-limit counters from being dropped under memory pressure.
    command: ["redis-server", "--save", "", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: ${LEXTURES_SERVER_IMAGE:?LEXTURES_SERVER_IMAGE is required}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      # First password Global Admin only when signup email matches (see docs/getting-started.md).
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      RUN_MIGRATIONS: "true"
      # Demo DB may retain checksums from migrations 120/135 after follow-up PR edits; align before migrate.
      MIGRATE_REPAIR_CHECKSUMS: "1"
      PORT: "8080"
      COURSE_FILES_ROOT: /mnt/lextures-db/course-files
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-studydrift}:${RABBITMQ_PASSWORD:-studydrift}@rabbitmq:5672/
      # Shared Redis for the JWT blocklist, rate limits, and caches (plan 17.2). In
      # production REDIS_URL points at managed Redis over TLS (rediss://...).
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:-http://localhost:5173}
      # Drain in-flight requests on SIGTERM during rolling restarts (plan 17.2 FR-8).
      SHUTDOWN_TIMEOUT_SECS: "30"
    volumes:
      - /mnt/lextures-db/course-files:/mnt/lextures-db/course-files
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/usr/bin/curl -fsS http://127.0.0.1:8080/health/live && /usr/bin/curl -fsS http://127.0.0.1:8080/health/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s

  web:
    image: ${LEXTURES_WEB_IMAGE:?LEXTURES_WEB_IMAGE is required}
    restart: unless-stopped
    environment:
      TLS_CERT_CN: ${TLS_CERT_CN:-demo.lextures.com}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    ports:
      - "80:80"
      - "443:443"
