# Run tests, lint, and builds for the Go API, browser clients, and related checks on pull requests targeting main.
# Does not run on direct pushes to main (see deploy-demo.yml for that path).

name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-go:
    name: Server (Go)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/studydrift_test
      RUN_MIGRATIONS: "true"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: studydrift_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d studydrift_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache-dependency-path: server/go.sum

      - name: go mod download
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # v1.x binaries were built with Go < 1.25 and cannot load configs for go 1.25 modules.
          version: v2.11.4
          working-directory: server
          args: --timeout=4m

      # Omit packages with no *_test.go files: Go 1.25 + -coverprofile can fail those with
      # "go: no such tool covdata" (golang/go#75031).
      - name: go test (internal packages; Postgres-backed integration tests)
        run: |
          FORMAT='{{if .TestGoFiles}}{{.ImportPath}}{{"\n"}}{{end}}'
          pkgs=$(go list -f "$FORMAT" ./internal/...)
          go test $pkgs -count=1 -timeout=5m -coverprofile=coverage.out -covermode=atomic

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      # Aggregate coverage of all ./internal/... is low while most packages lack tests. The true
      # total is ~11–12% but `go tool cover -func` prints one decimal, so values like 10.9% can
      # appear; use a 10.5% floor to avoid flaky CI while still catching large drops.
      - name: Cover total (>= 10.5% internal aggregate; raise as more packages are tested)
        run: |
          go tool cover -func=coverage.out | tail -1
          t=$(go tool cover -func=coverage.out | tail -1 | awk '{ gsub(/%/,"",$NF); print $NF }')
          echo "total statement coverage (internal): ${t}%"
          awk -v t="$t" 'BEGIN{ exit (t+0 < 10.5) ? 1 : 0 }' /dev/null || (echo "coverage of ./internal/... must be >= 10.5%" && exit 1)

      - name: go build
        run: go build -o /dev/null ./cmd/server

  client-cli:
    name: Client (CLI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: clients/cli/go.sum

      - name: go mod download
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # v1.x binaries were built with Go < 1.25 and cannot load configs for go 1.25 modules.
          version: v2.11.4
          working-directory: clients/cli
          args: --timeout=4m

      - name: go test
        run: go test ./... -count=1 -timeout=5m

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: go build
        run: go build -o /dev/null main.go

  clients:
    name: Client (${{ matrix.client }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client: [web]
    defaults:
      run:
        working-directory: clients/${{ matrix.client }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/${{ matrix.client }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high or critical)
        run: npm audit --audit-level=high

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright, no Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      E2E_USE_DOCKER: "0"
      E2E_DATABASE_URL: postgres://e2e:e2e@localhost:5432/e2e?sslmode=disable
      E2E_API_PORT: "8080"
      E2E_SERVER_BIN: ${{ github.workspace }}/.cache/e2e/server
      E2E_WEB_MODE: preview
      E2E_SKIP_DEPS: "1"
      E2E_HEALTH_POLL_SECS: "1"
      E2E_HEALTH_MAX_ATTEMPTS: "45"
      CI: "true"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e -d e2e"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache-dependency-path: server/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            clients/web/package-lock.json
            e2e/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Build API server binary
        working-directory: server
        run: |
          mkdir -p "${{ github.workspace }}/.cache/e2e"
          go build -trimpath -ldflags="-s -w" -o "${{ env.E2E_SERVER_BIN }}" ./cmd/server

      - name: Install and build web client
        working-directory: clients/web
        env:
          VITE_API_URL: http://localhost:8080
          VITE_FEATURE_STUDENT_PROGRESS: "true"
        run: |
          npm ci
          npm run build

      - name: Install e2e dependencies and Playwright browser
        working-directory: e2e
        run: |
          npm ci --prefer-offline --quiet
          npx playwright install --with-deps chromium

      - name: Run e2e suite (local stack)
        run: bash e2e/scripts/e2e-local.sh
