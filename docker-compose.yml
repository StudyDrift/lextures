# Web does not expose ports here so dev/prod overrides do not merge duplicate port mappings.
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build   # Vite HMR :5173 + Go API
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build    # nginx :3000

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studydrift
      POSTGRES_PASSWORD: studydrift
      POSTGRES_DB: studydrift
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studydrift -d studydrift"]
      interval: 5s
      timeout: 5s
      retries: 5

  clamav:
    # Official image is amd64-only; emulate on Apple Silicon (linux/arm64).
    image: clamav/clamav:1.4
    platform: linux/amd64
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: studydrift
      RABBITMQ_DEFAULT_PASS: studydrift
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      # sslmode=disable avoids TLS negotiation issues with the local Postgres container.
      DATABASE_URL: postgres://studydrift:studydrift@postgres:5432/studydrift?sslmode=disable
      JWT_SECRET: change-me-in-production-use-a-long-random-string
      # First password Global Admin only when signup email matches (see docs/getting-started.md, .env.example).
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      RUN_MIGRATIONS: "true"
      # Reconcile _sqlx_migrations checksums for listed idempotent migrations after SQL edits in dev.
      MIGRATE_REPAIR_CHECKSUMS: "1"
      COURSE_FILES_ROOT: /var/course-files
      PORT: "8080"
      RABBITMQ_URL: amqp://studydrift:studydrift@rabbitmq:5672/
    ports:
      - "8080:8080"
    volumes:
      - ./data/course-files:/var/course-files
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  web:
    build:
      context: ./clients/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - server

volumes:
  postgres_data:
