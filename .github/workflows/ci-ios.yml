      #       -project Lextures.xcodeproj \
      #       -scheme Lextures \
      #       -destination 'generic/platform=iOS Simulator' \
      #       -configuration Debug \
      #       CODE_SIGNING_ALLOWED=NO \
      #       | xcpretty
