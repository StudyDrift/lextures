# Local observability stack for plan 17.7 (Prometheus + Grafana + OTel Collector
# + Tempo + Alertmanager). Bring it up alongside the app to view metrics,
# dashboards, traces, and alerts end-to-end.
#
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up
#
# Point the API at the collector and expose its internal metrics port:
#   OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4318
#   METRICS_ADDR=:9090
#
# Grafana: http://localhost:3000 (admin/admin) — dashboards are auto-provisioned.
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9091:9090"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./deploy/observability/otel-collector/config.yml:/etc/otel/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./deploy/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    ports:
      - "3200:3200"
    restart: unless-stopped
