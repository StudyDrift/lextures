# Deploy Self: apply iac/self Terraform after publish-images pushes container images.
#
# Runs terraform init → plan → apply -auto-approve in iac/self, passing
# deploy_server_image and deploy_web_image from the publish-images workflow.
#
# Required repository secrets:
#   TF_TOKEN, TF_CLOUD_ORGANIZATION — HCP Terraform
#   Cloud credentials and other deploy settings live in the HCP workspace or terraform.tfvars.
#
# Triggers:
#   - Automatically after "Publish container images" succeeds on main
#   - Manual workflow_dispatch

name: Deploy Self

on:
  workflow_run:
    workflows:
      - Publish container images
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-self
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: "false"
  TF_TOKEN: ${{ secrets.TF_TOKEN }}
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN }}
  TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy Self
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Resolve deploy SHA
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.deploy.outputs.sha }}

      - name: Set image tags
        id: images
        run: |
          REPO_LOWER="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          SHA="${{ steps.deploy.outputs.sha }}"
          echo "server=ghcr.io/${REPO_LOWER}/server:${SHA}" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${REPO_LOWER}/web:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      # HCP Terraform uploads only iac/self to remote runners; sibling iac/modules is not
      # included unless it lives under the root module directory.
      - name: Stage Terraform modules for remote execution
        run: |
          set -euo pipefail
          rm -f iac/self/modules iac/self/docker-compose.deploy.yml
          cp -R iac/modules iac/self/modules
          cp docker-compose.deploy.yml iac/self/docker-compose.deploy.yml

      # Registry provider installs occasionally fail with 5xx (e.g. GitHub 502 during
      # signature fetch). Retries help both local init and remote-run init on HCP Terraform.
      - name: Terraform init
        working-directory: iac/self
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4; do
            if terraform init -input=false; then
              exit 0
            fi
            if [ "$attempt" -eq 4 ]; then
              exit 1
            fi
            echo "terraform init failed (attempt ${attempt}/4); retrying in 30s..."
            sleep 30
          done

      - name: Terraform plan
        working-directory: iac/self
        env:
          TF_VAR_deploy_server_image: ${{ steps.images.outputs.server }}
          TF_VAR_deploy_web_image: ${{ steps.images.outputs.web }}
          TF_VAR_deploy_registry_username: ${{ github.actor }}
          TF_VAR_deploy_registry_password: ${{ github.token }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: iac/self
        run: terraform apply -auto-approve -input=false tfplan

      - name: Deploy summary
        if: always()
        working-directory: iac/self
        run: |
          {
            echo "## Deploy Self summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Commit | \`${{ steps.deploy.outputs.sha }}\` |"
            echo "| Server image | \`${{ steps.images.outputs.server }}\` |"
            echo "| Web image | \`${{ steps.images.outputs.web }}\` |"
            ip="$(terraform output -raw droplet_reserved_ipv4 2>/dev/null || true)"
            if [ -n "$ip" ]; then
              echo "| Public IP | \`${ip}\` |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
